<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherESports</title>
  <meta name="description" content="AetherESports" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 50% 30%, #1b2a5e 0%, #0a0f24 55%, #05060f 100%);
      color: #f5f7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    /* subtle animated glow accents */
    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
      z-index: 0;
    }
    body::before {
      width: 40vmax; height: 40vmax;
      background: #6d3bff;
      top: -10vmax; left: -10vmax;
    }
    body::after {
      width: 35vmax; height: 35vmax;
      background: #00e0ff;
      bottom: -12vmax; right: -8vmax;
    }
    .hero { position: relative; z-index: 1; padding: 2rem; }
    .logo {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(90deg, #00e0ff 0%, #7b5bff 50%, #ff4ecd 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      text-shadow: 0 0 60px rgba(123, 91, 255, 0.35);
    }
    .tagline {
      margin-top: 1.25rem;
      font-size: clamp(0.9rem, 2.5vw, 1.25rem);
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #aeb8e8;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1 class="logo">AetherESports</h1>
    <p class="tagline">AetherESports</p>
  </main>
</body>
</html>
